<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Status-bar tint: dark by default, light variant for devices in light mode. -->
    <meta name="theme-color" content="#020817" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />
    <meta name="description" content="A modern, privacy-first character sheet manager for City of Mist, Otherscape, and Legend in the Mist TTRPGs." />
    <!-- iOS standalone: run full-screen when installed to the home screen. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Characters of the Mist" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <title>Characters of the Mist</title>
    <!-- No-flash theme: set the dark/light + palette classes on <html> synchronously, before the bundle paints,
         so a hard reload never flashes the wrong mode or palette. Reads the persisted app-settings blob directly.
         COUPLING: the key ('characters-of-the-mist_app-settings'), the zustand persist envelope ({ state: ... }),
         and the field names (themeMode, theme) must stay in lockstep with appSettingsStore's persist config. -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('characters-of-the-mist_app-settings') || '{}').state || {};
        var mode = s.themeMode || 'system';
        var dark = mode === 'dark' || (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        var c = document.documentElement.classList;
        c.add(dark ? 'dark' : 'light');
        if (s.theme) c.add(s.theme);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
